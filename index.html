<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>KPrint — Калькулятор</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="wrap">

    <div class="card">
        <h2>Параметры заказа</h2>

        <label>Тип пакета
            <div class="radio">
                <label><input type="radio" name="kind" value="square" checked> Квадратное дно</label>
                <label><input type="radio" name="kind" value="vbottom"> V-дно</label>
            </div>
        </label>

        <div class="grid">
            <div>
                <label>Тираж</label>
                <input type="number" id="qty" value="500" min="1"/>
                <div id="qtyWarning" class="warning hide"></div>
            </div>

            <!-- ЦВЕТ ДЛЯ <10k -->
            <div id="colorBlock">
                <label>Цвет бумаги</label>
                <select id="baseColor">
                    <option value="white">Белый</option>
                    <option value="brown">Бурый</option>
                </select>
            </div>

            <!-- МАТЕРИАЛЫ для ≥10k и V-дно -->
            <div id="materialBlock">
                <label id="materialLabel">Материал</label>
                <select id="material"></select>
            </div>

            <!-- ГОТОВЫЕ РАЗМЕРЫ (для <10k) -->
            <div id="readyPackBlock">
                <label>Готовый пакет (Ш×Г×В)</label>
                <select id="readyPack"></select>
            </div>

            <!-- ПЕЧАТЬ (<10k) -->
            <div id="printTypeBlock">
                <label>Тип печати</label>
                <div class="radio">
                    <label><input type="radio" name="printType" value="one" checked> 1 сторона</label>
                    <label><input type="radio" name="printType" value="two"> 2 стороны</label>
                </div>
            </div>
            <div id="chromacityBlock">
                <label>Цветность печати</label>
                <select id="chromacity">
                    <option value="bw">1 цвет</option>
                    <option value="color">Несколько цветов</option>
                </select>
            </div>

            <!-- РУЧКИ (только квадратное) -->
            <div id="handlesBlock">
                <label>Наличие ручек</label>
                <select id="handles"><option>Да</option><option>Нет</option></select>
            </div>

            <!-- ФОРМУЛЫ: размеры/цвета -->
            <div id="f-width">
                <label>Ширина, мм </label>
                <select id="width"></select>
                <div id="hintWidth" class="hint">Рекомендуемые: <b>180</b>, <b>220</b>, <b>260</b>, <b>330</b></div>
                <div id="rollWarning" class="warning hide"></div>
            </div>

            <div id="f-depth">
                <label>Глубина, мм </label>
                <input type="number" id="depth" value="120"/>
                <div id="hintDepth" class="hint">Рекомендуемые: <b>120</b>, <b>140</b>, <b>170</b></div>
                <div id="rapportWarning" class="warning hide"></div>
            </div>

            <div class="input-group hide" id="f-height">
                <label for="height">Высота (мм):</label>
                <input type="number" id="height" value="300">
            </div>

            <div class="input-group hide" id="windowBlock">
                <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                    <input type="checkbox" id="hasWindow">
                    <span>Добавить окошко (пленка)</span>
                </label>
            </div>
            <div class="input-group hide" id="windowWidthBlock">
                <label for="windowWidth">Ширина окна (мм):</label>
                <input type="number" id="windowWidth" value="50">
                <div id="windowWarning" class="warning hide" style="color: red; font-size: 0.9em; margin-top: 5px;"></div>
            </div>

            <div id="f-colors"><label>Количество цветов</label><select id="colors"></select></div>
        </div>

        <button class="btn" id="calcBtn">Рассчитать</button>
    </div>

    <div class="card">
        <h2>Итоги</h2>
        <div class="totals">
            <div class="kpi"><h3>Цена за ед. (₸)</h3><div class="v" id="ppu">—</div></div>
            <div class="kpi"><h3>Клише (₸)</h3><div class="v" id="cliche">—</div></div>
            <div class="kpi"><h3>Сумма заказа (₸)</h3><div class="v" id="sum">—</div></div>
        </div>
    </div>

</div>

<script src="js/script.js"></script>
</body>
</html>
